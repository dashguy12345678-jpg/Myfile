<!DOCTYPE html>
<html lang="en">
<head>
    <title>Secure System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #000000, #020d02);
            color: #00ff88;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* Matrix Background Effect */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #centerBox {
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #startBtn {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        #startBtn:hover {
            background: #00ff88;
            color: black;
        }

        #loadingText {
            font-size: 20px;
            margin-top: 20px;
        }

        #warning {
            display: none;
            font-size: 35px;
            color: red;
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, 2px); }
            100% { transform: translate(2px, 2px); }
        }

        #videoContainer {
            display: none;
            text-align: center;
        }

        video {
            width: 80%;
            border-radius: 15px;
            box-shadow: 0 0 40px #00ff88;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="centerBox">
    <button id="startBtn">click to continue</button>
    <div id="loadingText"></div>
    <div id="warning">⚠ ACCESS GRANTED ⚠</div>

    <div id="videoContainer">
        <video id="memeVideo">
            <source src="C:\Users\Kavy Mistry\Downloads\meme.mp4.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
    // MATRIX EFFECT
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    let letters = "01";
    letters = letters.split("");

    let fontSize = 14;
    let columns = canvas.width / fontSize;

    let drops = [];
    for (let x = 0; x < columns; x++) drops[x] = 1;

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#00ff88";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            let text = letters[Math.floor(Math.random()*letters.length)];
            ctx.fillText(text, i*fontSize, drops[i]*fontSize);

            if (drops[i]*fontSize > canvas.height && Math.random() > 0.975)
                drops[i] = 0;

            drops[i]++;
        }
    }

    setInterval(drawMatrix, 33);

    // PRANK LOGIC
    let messages = [
        "Connecting to encrypted server...",
        "Decrypting user data...",
        "Injecting payload...",
        "Accessing camera...",
        "Downloading files...",
        "Finalizing..."
    ];

    let i = 0;
    const btn = document.getElementById("startBtn");
    const loading = document.getElementById("loadingText");
    const warning = document.getElementById("warning");
    const video = document.getElementById("memeVideo");

    btn.onclick = () => {
        btn.style.display = "none";
        nextMessage();
    };

    function nextMessage() {
        if (i < messages.length) {
            loading.innerText = messages[i];
            i++;
            setTimeout(nextMessage, 1200);
        } else {
            loading.style.display = "none";
            warning.style.display = "block";

            setTimeout(() => {
                warning.style.display = "none";
                document.getElementById("videoContainer").style.display = "block";

                video.play(); // plays with sound
            }, 2000);
        }
    }
</script>

</body>
</html>
